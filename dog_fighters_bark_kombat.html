<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Dog Fighters: Bark Kombat</title>
<style>
  :root {
    --panel: rgba(10,10,18,.86);
    --text: #fff;
  }
  * { box-sizing: border-box; touch-action: manipulation; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #34275c, #100d1f 60%, #05050a);
    color: var(--text);
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
  }
  #game {
    width: min(100%, 980px);
    padding: 10px;
  }
  h1 {
    margin: 6px 0 2px;
    text-align: center;
    letter-spacing: 2px;
    font-size: clamp(26px, 6vw, 58px);
    text-shadow: 0 4px 0 #000, 0 0 18px #ff00aa;
  }
  .subtitle {
    text-align:center;
    font-family: Arial, sans-serif;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .fighter-card {
    background: var(--panel);
    border: 3px solid #fff;
    border-radius: 12px;
    padding: 8px;
    box-shadow: 0 0 12px rgba(255,255,255,.2);
  }
  .fighter-card.right { text-align: right; }
  .name { font-size: clamp(16px, 3vw, 28px); }
  .health {
    width: 100%;
    height: 18px;
    background: #3b0d0d;
    border: 2px solid #fff;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 4px;
  }
  .health > div {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #28d44f, #d9ff42);
    transition: width .25s;
  }
  .meter {
    height: 10px;
    background:#222;
    border:1px solid #fff;
    border-radius:999px;
    overflow:hidden;
    margin-top:5px;
  }
  .meter > div {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d9ff,#ff00cc);
    transition: width .2s;
  }
  #round {
    min-width: 74px;
    text-align:center;
    font-size: clamp(20px, 4vw, 34px);
    text-shadow: 0 3px #000;
  }
  #arena {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    min-height: 260px;
    border: 4px solid #fff;
    border-radius: 14px;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 20%, rgba(255,255,255,.85), transparent 7%),
      linear-gradient(#151c53 0 58%, #6d334f 58% 64%, #16101e 64%);
    box-shadow: 0 0 30px rgba(255,0,170,.35);
  }
  #arena::before {
    content:"";
    position:absolute; inset:0;
    background:
      repeating-linear-gradient(90deg, transparent 0 48px, rgba(255,255,255,.05) 49px 50px),
      linear-gradient(transparent 70%, rgba(0,0,0,.45));
    pointer-events:none;
  }
  .crowd {
    position:absolute;
    left:0; right:0; bottom:31%;
    height:23%;
    background:
      radial-gradient(circle at 10px 24px,#090909 0 8px,transparent 9px) 0 0/38px 40px,
      radial-gradient(circle at 26px 20px,#050505 0 9px,transparent 10px) 0 0/42px 38px;
    opacity:.9;
  }
  .fighter {
    position:absolute;
    bottom: 10%;
    width: 28%;
    max-width:240px;
    min-width:105px;
    aspect-ratio: 1/1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size: clamp(70px, 17vw, 180px);
    filter: drop-shadow(0 12px 8px rgba(0,0,0,.65));
    transition: left .14s, right .14s, transform .12s, filter .12s;
    user-select:none;
  }
  #player { left:7%; transform:scaleX(1); }
  #enemy { right:7%; transform:scaleX(-1); }
  .hit { animation: hit .32s ease; }
  .attack { animation: attack .25s ease; }
  .dodge { animation: dodge .32s ease; }
  .ultimate { animation: ultimate .75s ease; }
  @keyframes hit { 0%,100%{filter:drop-shadow(0 12px 8px #000)} 35%{filter:brightness(3) saturate(0) drop-shadow(0 0 22px red);transform:translateX(-14px) rotate(-7deg)} }
  @keyframes attack { 50%{transform:translateX(38px) scale(1.15)} }
  @keyframes dodge { 50%{transform:translateY(-60px) rotate(-12deg)} }
  @keyframes ultimate { 25%{filter:brightness(2) drop-shadow(0 0 30px cyan);transform:scale(1.35) rotate(-8deg)} 60%{filter:brightness(3) drop-shadow(0 0 45px magenta);transform:scale(1.55) rotate(8deg)} }
  #banner {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-size: clamp(34px, 9vw, 90px);
    text-shadow: 0 6px #000, 0 0 20px #ff00b7;
    pointer-events:none;
    opacity:0;
    transform:scale(.6);
    transition:.25s;
    z-index:10;
  }
  #banner.show { opacity:1; transform:scale(1); }
  #log {
    margin-top:8px;
    background:var(--panel);
    border:2px solid #fff;
    border-radius:10px;
    min-height:54px;
    padding:10px;
    font-family:Arial,sans-serif;
    font-weight:700;
    text-align:center;
  }
  .controls {
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:8px;
    margin-top:8px;
  }
  button {
    appearance:none;
    border:3px solid #fff;
    border-radius:12px;
    padding:12px 4px;
    color:#fff;
    font: 900 clamp(12px, 3vw, 20px) Arial,sans-serif;
    text-shadow:0 2px #000;
    box-shadow:0 5px 0 #000;
    cursor:pointer;
  }
  button:active { transform:translateY(4px); box-shadow:0 1px 0 #000; }
  button:disabled { opacity:.35; filter:grayscale(1); }
  .bite { background:#c12b2b; }
  .bark { background:#cd7a10; }
  .dodgeBtn { background:#1765c1; }
  .special { background:#7730bd; }
  .ult { background:linear-gradient(135deg,#00b6ff,#ef00bf); }
  .bottom {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
  }
  .bottom button { background:#222; }
  #selectScreen {
    position:fixed; inset:0;
    background:linear-gradient(145deg,#120b26,#411154);
    z-index:99;
    display:flex; align-items:center; justify-content:center;
    padding:16px;
  }
  .selectBox {
    width:min(720px,100%);
    text-align:center;
  }
  .roster {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:14px;
  }
  .dogChoice {
    background:rgba(0,0,0,.42);
    border:3px solid #fff;
    border-radius:14px;
    padding:12px;
    cursor:pointer;
  }
  .dogChoice:hover,.dogChoice.selected { outline:5px solid #ff00bd; transform:scale(1.02); }
  .dogEmoji { font-size:64px; }
  .small { font-family:Arial,sans-serif; font-size:13px; line-height:1.3; }
  #startBtn { margin-top:14px; width:100%; background:#18a34a; }
  @media(max-width:600px){
    .controls { grid-template-columns:repeat(3,1fr); }
    .ult { grid-column:span 2; }
    .hud { grid-template-columns:1fr 54px 1fr; }
  }
</style>
</head>
<body>
<div id="selectScreen">
  <div class="selectBox">
    <h1>DOG FIGHTERS<br>BARK KOMBAT</h1>
    <div class="subtitle">Choose your champion</div>
    <div class="roster" id="roster"></div>
    <button id="startBtn" disabled>SELECT A FIGHTER</button>
  </div>
</div>

<div id="game">
  <h1>DOG FIGHTERS: BARK KOMBAT</h1>
  <div class="subtitle">Tap the buttons or use A, B, C, D and U</div>

  <div class="hud">
    <div class="fighter-card">
      <div class="name" id="pName">HUNNY BEAR</div>
      <div class="health"><div id="pHealth"></div></div>
      <div class="meter"><div id="pMeter"></div></div>
    </div>
    <div id="round">ROUND 1</div>
    <div class="fighter-card right">
      <div class="name" id="eName">GREMLIN DOG</div>
      <div class="health"><div id="eHealth"></div></div>
      <div class="meter"><div id="eMeter"></div></div>
    </div>
  </div>

  <div id="arena">
    <div class="crowd"></div>
    <div id="player" class="fighter">🐶</div>
    <div id="enemy" class="fighter">🐕</div>
    <div id="banner"></div>
  </div>

  <div id="log">Choose your move.</div>

  <div class="controls">
    <button class="bite" data-move="bite">A<br>BITE</button>
    <button class="bark" data-move="bark">B<br>BARK</button>
    <button class="dodgeBtn" data-move="dodge">C<br>DODGE</button>
    <button class="special" data-move="special">D<br>SPECIAL</button>
    <button class="ult" data-move="ultimate">U<br>ULTIMATE</button>
  </div>

  <div class="bottom">
    <button id="restart">RESTART FIGHT</button>
    <button id="change">CHANGE FIGHTER</button>
  </div>
</div>

<script>
const dogs = [
  {name:"HUNNY BEAR", emoji:"🐶", special:"Heart Beam", ultimate:"Belly Rub Fury"},
  {name:"BARKZILLA", emoji:"🐕", special:"Bone Throw", ultimate:"Mega Bark Blast"},
  {name:"SIR WIGGLES", emoji:"🐩", special:"Zoomies Attack", ultimate:"Couch Destruction"},
  {name:"GREMLIN DOG", emoji:"🐕‍🦺", special:"Sock Steal", ultimate:"Laundry Tornado"}
];

let playerDog = null, enemyDog = null;
let pHP=100,eHP=100,pPower=0,ePower=0,locked=false,round=1;

const roster = document.getElementById("roster");
dogs.forEach((d,i)=>{
  const card=document.createElement("div");
  card.className="dogChoice";
  card.innerHTML=`<div class="dogEmoji">${d.emoji}</div><div>${d.name}</div><div class="small">Special: ${d.special}<br>Ultimate: ${d.ultimate}</div>`;
  card.onclick=()=>{
    document.querySelectorAll(".dogChoice").forEach(x=>x.classList.remove("selected"));
    card.classList.add("selected");
    playerDog=d;
    document.getElementById("startBtn").disabled=false;
    document.getElementById("startBtn").textContent="START BARK KOMBAT";
  };
  roster.appendChild(card);
});

document.getElementById("startBtn").onclick=()=>{
  const choices=dogs.filter(d=>d!==playerDog);
  enemyDog=choices[Math.floor(Math.random()*choices.length)];
  document.getElementById("selectScreen").style.display="none";
  resetFight();
};

function resetFight(){
  pHP=eHP=100; pPower=ePower=0; locked=false;
  document.getElementById("pName").textContent=playerDog.name;
  document.getElementById("eName").textContent=enemyDog.name;
  document.getElementById("player").textContent=playerDog.emoji;
  document.getElementById("enemy").textContent=enemyDog.emoji;
  document.getElementById("log").textContent=`${playerDog.name} faces ${enemyDog.name}. FIGHT!`;
  updateHUD();
  flash("FIGHT!");
}

function updateHUD(){
  document.getElementById("pHealth").style.width=Math.max(0,pHP)+"%";
  document.getElementById("eHealth").style.width=Math.max(0,eHP)+"%";
  document.getElementById("pMeter").style.width=Math.min(100,pPower)+"%";
  document.getElementById("eMeter").style.width=Math.min(100,ePower)+"%";
  document.querySelector('[data-move="ultimate"]').disabled=pPower<100 || locked || pHP<=0 || eHP<=0;
  document.querySelectorAll(".controls button").forEach(b=>{
    if(b.dataset.move!=="ultimate") b.disabled=locked || pHP<=0 || eHP<=0;
  });
}

function flash(text){
  const b=document.getElementById("banner");
  b.textContent=text; b.classList.add("show");
  setTimeout(()=>b.classList.remove("show"),700);
}

function animate(id,cls){
  const el=document.getElementById(id);
  el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),800);
}

function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function doMove(move){
  if(locked || pHP<=0 || eHP<=0) return;
  locked=true;
  let damage=0, text="", dodgeChance=0;

  if(move==="bite"){ damage=rand(8,14); pPower+=18; text=`${playerDog.name} bites for ${damage} damage!`; animate("player","attack"); }
  if(move==="bark"){ damage=rand(5,10); pPower+=22; text=`${playerDog.name} unleashes a deafening bark for ${damage} damage!`; animate("player","attack"); }
  if(move==="dodge"){ pPower+=16; dodgeChance=.75; text=`${playerDog.name} gets ready to dodge!`; animate("player","dodge"); }
  if(move==="special"){ damage=rand(14,22); pPower+=28; text=`${playerDog.name} uses ${playerDog.special} for ${damage} damage!`; animate("player","attack"); }
  if(move==="ultimate"){
    if(pPower<100){ locked=false; return; }
    damage=rand(28,40); pPower=0; text=`ULTIMATE! ${playerDog.name} uses ${playerDog.ultimate} for ${damage} damage!`; animate("player","ultimate"); flash("ULTIMATE!");
  }

  if(damage>0){ eHP-=damage; animate("enemy","hit"); }
  document.getElementById("log").textContent=text;
  updateHUD();

  if(eHP<=0){ setTimeout(()=>finish(true),650); return; }

  setTimeout(()=>enemyTurn(dodgeChance),700);
}

function enemyTurn(playerDodgeChance){
  let moves=["bite","bark","special"];
  let move=ePower>=100 && Math.random()<.55 ? "ultimate" : moves[Math.floor(Math.random()*moves.length)];
  let damage=0, text="";
  if(move==="bite"){ damage=rand(7,13); ePower+=18; text=`${enemyDog.name} bites back for ${damage}!`; }
  if(move==="bark"){ damage=rand(5,10); ePower+=22; text=`${enemyDog.name} fires a brutal bark for ${damage}!`; }
  if(move==="special"){ damage=rand(13,21); ePower+=28; text=`${enemyDog.name} uses ${enemyDog.special} for ${damage}!`; }
  if(move==="ultimate"){ damage=rand(27,39); ePower=0; text=`${enemyDog.name} uses ${enemyDog.ultimate} for ${damage}!`; flash("ENEMY ULTIMATE!"); }

  animate("enemy",move==="ultimate"?"ultimate":"attack");

  if(Math.random()<playerDodgeChance){
    damage=0;
    text=`${playerDog.name} dodges it perfectly!`;
    animate("player","dodge");
  } else {
    pHP-=damage;
    animate("player","hit");
  }

  if(enemyDog.name==="GREMLIN DOG" && move==="special"){
    text += " Your left sock disappears forever.";
  }

  document.getElementById("log").textContent=text;
  updateHUD();

  if(pHP<=0){ setTimeout(()=>finish(false),650); return; }
  locked=false;
  updateHUD();
}

function finish(win){
  locked=true;
  flash(win?"YOU WIN!":"K.O.!");
  document.getElementById("log").textContent=win
    ? `${playerDog.name} wins the Bark Kombat championship!`
    : `${enemyDog.name} wins. Demand a rematch!`;
  updateHUD();
}

document.querySelectorAll("[data-move]").forEach(btn=>btn.onclick=()=>doMove(btn.dataset.move));
document.getElementById("restart").onclick=resetFight;
document.getElementById("change").onclick=()=>{ document.getElementById("selectScreen").style.display="flex"; };

window.addEventListener("keydown",e=>{
  const map={a:"bite",b:"bark",c:"dodge",d:"special",u:"ultimate"};
  const move=map[e.key.toLowerCase()];
  if(move) doMove(move);
});
</script>
</body>
</html>
